name: Blue-Green Deployment Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '17'
  GITOPS_REPO: 'rashmitha26-star/argocd-CD-kubernetes'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: BUILD AND TEST
  # ═══════════════════════════════════════════════════════════════
  build-and-test:
    name: Build and Test Application
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      
    steps:
      # ─────────────────────────────────────────────────────────
      # STEP 1: CHECKOUT CODE
      # ─────────────────────────────────────────────────────────
      - name: 📥 Checkout Application Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history for versioning
        # WHY: Runner needs source code to build
        # fetch-depth: 0 allows semantic versioning from git tags
        
      # ─────────────────────────────────────────────────────────
      # STEP 2: SETUP JAVA
      # ─────────────────────────────────────────────────────────
      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'  # Eclipse Temurin (AdoptOpenJDK)
          cache: 'maven'           # Cache Maven dependencies
        # WHY: Java 17 is LTS with performance improvements
        # Cache reduces build time from 5min to 30sec
        
      - name: 📊 Display Java Version
        run: |
          java -version
          mvn -version
        # WHY: Verify correct Java version for debugging
        
      # ─────────────────────────────────────────────────────────
      # STEP 3: RUN UNIT TESTS
      # ─────────────────────────────────────────────────────────
      - name: 🧪 Run Unit Tests
        run: mvn test -B
        # WHY: -B = batch mode (non-interactive)
        # Catches bugs before building artifacts
        
      - name: 📈 Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()  # Run even if tests fail
        with:
          name: Maven Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true
        # WHY: Visualize test results in GitHub Actions UI
        # if: always() ensures reports published even on failure
        
      - name: 📊 Generate Test Coverage Report
        run: mvn jacoco:report
        # WHY: Code coverage metrics for quality gates
        
      # ─────────────────────────────────────────────────────────
      # STEP 4: MAVEN BUILD
      # ─────────────────────────────────────────────────────────
      - name: 🔨 Build with Maven
        run: mvn clean package -DskipTests -B
        # WHY: 
        # - clean: Remove old artifacts
        # - package: Create JAR/WAR
        # - DskipTests: Already tested in previous step
        # - B: Batch mode for cleaner logs
        
      - name: 📦 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 5
        # WHY: Share artifact between jobs without rebuilding
        # retention-days: 5 saves storage costs
        
      - name: 🏷️ Generate Version Tag
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
        # WHY: Extract version from pom.xml for tagging

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: DOCKER BUILD AND SECURITY SCAN
  # ═══════════════════════════════════════════════════════════════
  docker-build-scan:
    name: Docker Build and Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test  # Wait for tests to pass
    
    permissions:
      contents: read
      packages: write        # Push to GHCR
      security-events: write # Upload Trivy results
      
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 📦 Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: target/
        # WHY: Reuse JAR from previous job
        
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # WHY: Enables advanced Docker features:
        # - Multi-platform builds
        # - Build caching
        # - Parallel builds
        
      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        # WHY: Authenticate before pushing images
        # GITHUB_TOKEN is auto-provided (no manual secret needed)
        
      - name: 🏷️ Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=blue-{{date 'YYYYMMDD-HHmmss'}}
        # WHY: Generate multiple tags:
        # - SHA: Immutable reference
        # - Branch: Track branch deployments
        # - Semver: Version tracking
        # - Blue timestamp: Blue-green versioning
        
      # ─────────────────────────────────────────────────────────
      # STEP 5: DOCKER BUILD
      # ─────────────────────────────────────────────────────────
      - name: 🏗️ Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false  # Don't push yet (scan first!)
          load: true   # Load into Docker daemon for scanning
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.build-and-test.outputs.version }}
        # WHY:
        # - push: false = Build but don't push (scan first)
        # - load: true = Make available for Trivy scan
        # - cache-from/to: Speed up builds using GitHub cache
        
      # ─────────────────────────────────────────────────────────
      # STEP 6: TRIVY SECURITY SCAN
      # ─────────────────────────────────────────────────────────
      - name: 🔍 Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # FAIL pipeline if vulnerabilities found
          ignore-unfixed: true  # Ignore vulnerabilities without fixes
        # WHY:
        # - exit-code: 1 = Prevents vulnerable images from deployment
        # - SARIF format = GitHub Security integration
        # - ignore-unfixed = Don't fail on vulnerabilities with no fix available
        
      - name: 📤 Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()  # Upload even if scan found issues
        with:
          sarif_file: 'trivy-results.sarif'
        # WHY: View vulnerabilities in GitHub Security tab
        # if: always() ensures upload even on scan failure
        
      - name: 📊 Generate Trivy HTML Report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'template'
          template: '@/contrib/html.tpl'
          output: 'trivy-report.html'
          
      - name: 📤 Upload Trivy HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: trivy-report.html
        # WHY: Human-readable security report for review
        
      # ─────────────────────────────────────────────────────────
      # STEP 7: PUSH DOCKER IMAGE
      # ─────────────────────────────────────────────────────────
      - name: 🚀 Push Docker Image to Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true  # NOW push after security scan passed
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          build-args: |
            VERSION=${{ needs.build-and-test.outputs.version }}
        # WHY: Only push if tests and security scans passed
        # Uses same build cache from previous step
        
      - name: 📝 Image Digest
        run: echo "Image pushed with digest: ${{ steps.meta.outputs.digest }}"

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: UPDATE GITOPS REPOSITORY
  # ═══════════════════════════════════════════════════════════════
  update-gitops:
    name: Update GitOps Repository
    runs-on: ubuntu-latest
    needs: docker-build-scan  # Wait for image to be pushed
    if: github.ref == 'refs/heads/main'  # Only on main branch
    
    steps:
      # ─────────────────────────────────────────────────────────
      # STEP 8: UPDATE HELM VALUES.YAML
      # ─────────────────────────────────────────────────────────
      - name: 📥 Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}  # Personal Access Token
          path: gitops
        # WHY: Need write access to GitOps repo
        # GITOPS_PAT must have repo write permissions
        
      - name: 🛠️ Install yq (YAML processor)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
        # WHY: yq allows programmatic YAML updates
        
      - name: 🔄 Determine Blue-Green Slot
        id: slot
        run: |
          cd gitops/helm/charts
          
          # Read current active slot (blue or green)
          CURRENT_ACTIVE=$(yq eval '.blueGreen.activeSlot' values.yaml)
          
          # Determine which slot to update (the inactive one)
          if [ "$CURRENT_ACTIVE" == "blue" ]; then
            NEW_SLOT="green"
          else
            NEW_SLOT="blue"
          fi
          
          echo "current_active=$CURRENT_ACTIVE" >> $GITHUB_OUTPUT
          echo "new_slot=$NEW_SLOT" >> $GITHUB_OUTPUT
          echo "📍 Current active: $CURRENT_ACTIVE"
          echo "🎯 Deploying to: $NEW_SLOT"
        # WHY: Blue-green strategy deploys to inactive environment
        # Allows testing before switching traffic
        
      - name: 📝 Update Helm Values for New Deployment
        run: |
          cd gitops/helm/charts
          
          NEW_SLOT="${{ steps.slot.outputs.new_slot }}"
          IMAGE_TAG="${{ github.sha }}"
          
          # Update image tag for the new slot
          yq eval -i ".blueGreen.${NEW_SLOT}.image.repository = \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\"" values.yaml
          yq eval -i ".blueGreen.${NEW_SLOT}.image.tag = \"${IMAGE_TAG}\"" values.yaml
          yq eval -i ".blueGreen.${NEW_SLOT}.enabled = true" values.yaml
          
          # Add deployment metadata
          yq eval -i ".blueGreen.${NEW_SLOT}.deployedAt = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" values.yaml
          yq eval -i ".blueGreen.${NEW_SLOT}.deployedBy = \"${{ github.actor }}\"" values.yaml
          yq eval -i ".blueGreen.${NEW_SLOT}.commitSha = \"${IMAGE_TAG}\"" values.yaml
          
          echo "✅ Updated $NEW_SLOT environment with image: ${IMAGE_TAG}"
          
          # Display changes
          echo "📄 Updated values.yaml:"
          yq eval ".blueGreen.${NEW_SLOT}" values.yaml
        # WHY: Updates inactive slot with new image
        # Metadata helps with audit trail and debugging
        
      # ─────────────────────────────────────────────────────────
      # STEP 9: PUSH TO GITOPS REPO
      # ─────────────────────────────────────────────────────────
      - name: 🚀 Commit and Push GitOps Changes
        run: |
          cd gitops
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add helm/charts/values.yaml
          
          # Create descriptive commit message
          git commit -m "🚀 Deploy ${{ github.sha }} to ${{ steps.slot.outputs.new_slot }} environment
          
          - Application: ${{ github.repository }}
          - Deployed by: ${{ github.actor }}
          - Commit: ${{ github.sha }}
          - Slot: ${{ steps.slot.outputs.new_slot }}
          - Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          Triggered by: ${{ github.event_name }} on ${{ github.ref }}"
          
          git push
          
          echo "✅ GitOps repository updated successfully"
        # WHY: Triggers ArgoCD to sync and deploy
        # Descriptive commit message provides audit trail
        
      - name: 💬 Create Deployment Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const slot = '${{ steps.slot.outputs.new_slot }}';
            const sha = '${{ github.sha }}';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Deployment Status
              
              ✅ Successfully deployed to **${slot.toUpperCase()}** environment
              
              **Details:**
              - 🏷️ Image Tag: \`${sha}\`
              - 🎯 Environment: \`${slot}\`
              - 👤 Deployed by: @${{ github.actor }}
              - 🕐 Time: ${new Date().toISOString()}
              
              **Next Steps:**
              1. Verify deployment in ${slot} environment
              2. Run smoke tests
              3. Switch traffic if validation passes
              
              **Rollback:** If issues found, revert to ${{ steps.slot.outputs.current_active }} environment
              
              [View ArgoCD Dashboard](https://argocd.yourdomain.com)
              `
            })
        # WHY: Notify team of deployment status
        # Provides quick access to deployment info
        
      - name: 📊 Deployment Summary
        run: |
          echo "## 🎉 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ steps.slot.outputs.new_slot }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Active Slot | ${{ steps.slot.outputs.current_active }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [ArgoCD Dashboard](https://argocd.yourdomain.com)" >> $GITHUB_STEP_SUMMARY
          echo "- [Kubernetes Dashboard](https://k8s.yourdomain.com)" >> $GITHUB_STEP_SUMMARY
          echo "- [${{ steps.slot.outputs.new_slot }} Environment](https://${{ steps.slot.outputs.new_slot }}.yourdomain.com)" >> $GITHUB_STEP_SUMMARY
        # WHY: GitHub Actions summary provides quick overview

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: NOTIFY ON FAILURE
  # ═══════════════════════════════════════════════════════════════
  notify-failure:
    name: Notify on Pipeline Failure
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build-scan, update-gitops]
    if: failure()
    
    steps:
      - name: 🚨 Send Failure Notification
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Deployment Failed: ${context.sha.substring(0, 7)}`,
              body: `## Deployment Pipeline Failed
              
              **Commit:** ${context.sha}
              **Branch:** ${context.ref}
              **Actor:** @${context.actor}
              **Workflow:** ${context.workflow}
              
              [View Failed Run](${context.payload.repository.html_url}/actions/runs/${context.runId})
              
              Please investigate and fix the issues.`,
              labels: ['deployment-failure', 'urgent']
            })
        # WHY: Alert team of deployment failures
        # Creates GitHub issue for tracking
